[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "refract"
version = "1.3.0"
description = "Simple GUI for ranking Arch Linux and distro-specific pacman mirrors"
requires-python = ">=3.11"
dependencies = [
    "requests",
]

[project.scripts]
refract = "refract.__main__:main"
refract-rank = "refract.rank_info:main"

[tool.hatch.build.targets.wheel]
packages = ["refract"]

[tool.pylint.main]
disable = [
    "missing-module-docstring",
    "missing-function-docstring",
    "too-few-public-methods",
    "too-many-instance-attributes",
    "too-many-arguments",
    "too-many-locals",
]

[tool.pylint.format]
max-line-length = 120
