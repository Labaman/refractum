name: Pylint

on: [push, pull_request]

jobs:
  pylint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Install system dependencies
      run: sudo apt-get install -y python3-gi libgirepository1.0-dev libgirepository-2.0-dev gir1.2-gtk-4.0 libcairo2-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint flake8 requests PyGObject

    - name: Run pylint
      run: pylint refract/

    - name: Run flake8
      run: flake8 refract/ --config .github/flake8.ini
