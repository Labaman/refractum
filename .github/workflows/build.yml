name: Build package

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    permissions:
      contents: write
    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm base-devel git python-build python-installer python-hatchling github-cli

      - uses: actions/checkout@v6

      - name: Build package
        run: |
          useradd -m builder
          chown -R builder:builder .
          su builder -c "makepkg -f --noconfirm"

      - name: Upload to release
        run: gh release upload ${{ github.ref_name }} *.pkg.tar.zst
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
