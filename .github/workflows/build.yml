name: Build package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.4.1)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    permissions:
      contents: write
    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm base-devel git python-build python-installer python-hatchling github-cli

      - uses: actions/checkout@v6

      - name: Build package
        run: |
          useradd -m builder
          chown -R builder:builder .
          su builder -c "makepkg -f --noconfirm --nodeps"
          cp *.pkg.tar.zst /tmp/

      - name: Upload to release
        run: gh release upload ${{ github.event.inputs.tag || github.ref_name }} /tmp/*.pkg.tar.zst
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
